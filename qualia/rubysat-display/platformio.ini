; platformio.ini — rubysat Qualia ESP32-S3 RGB-666 gauge display
;
; PlatformIO is one of two supported build paths (the other is arduino-cli;
; see qualia/README.md). This config targets the Adafruit Qualia S3 with octal
; PSRAM, 16MB flash, and pulls Arduino_GFX + LVGL v8 + ArduinoJson.
;
; Build:  pio run
; Upload: pio run -t upload --upload-port /dev/cu.usbmodem21201
; Monitor: pio device monitor -b 115200

[env:qualia_s3_rgb666]
platform = espressif32
board = adafruit_qualia_s3_rgb666
framework = arduino

; --- Serial / upload ---
monitor_speed = 115200
upload_speed = 921600

; --- PSRAM (octal / OPI) + 16MB flash ---
board_build.arduino.memory_type = qio_opi   ; flash QIO + PSRAM OPI (octal)
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.partitions = default_16MB.csv

build_flags =
  ; LVGL: keep lv_conf.h next to the sketch and include it by simple path.
  -D LV_CONF_INCLUDE_SIMPLE
  -I src
  ; Enable PSRAM in the core.
  -D BOARD_HAS_PSRAM
  ; Arduino_GFX RGB panel is fine with defaults; nothing extra needed.
  -D CORE_DEBUG_LEVEL=1

lib_deps =
  moononournation/GFX Library for Arduino @ ^1.4.9
  lvgl/lvgl @ ^8.3.11
  bblanchon/ArduinoJson @ ^6.21.5

; NOTE on lv_conf.h with PlatformIO + lvgl:
;   The lvgl library reads LV_CONF_INCLUDE_SIMPLE and then #include "lv_conf.h".
;   PlatformIO compiles the sketch from src/, so place (or symlink) lv_conf.h
;   under src/ as well, OR set:
;     build_flags = -D LV_CONF_PATH="${PROJECT_DIR}/lv_conf.h"
;   This repo keeps lv_conf.h beside the .ino; for a pure-PIO layout move the
;   .ino/.cpp/.h files into src/ and lv_conf.h alongside them.
