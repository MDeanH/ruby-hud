# Drop-in for rubyhud.service, installed to
# /etc/systemd/system/rubyhud.service.d/10-health.conf.
# With Restart=always RestartSec=2, four failed starts inside 120s trip the
# start limit and hand control to ruby-rollback.service.
[Unit]
StartLimitIntervalSec=120
StartLimitBurst=4
OnFailure=ruby-rollback.service
